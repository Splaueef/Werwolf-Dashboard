services:
  werwolf:
    build: .
    restart: unless-stopped
    ports:
      - "7433:7433"
    environment:
      # ОБОВ'ЯЗКОВО змінити на випадковий рядок!
      # Згенерувати: python3 -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: "CHANGE_ME_TO_RANDOM_SECRET_KEY"
      HTTPS: "1"       # встанови "1" якщо за Nginx з SSL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7433/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx з SSL (Let's Encrypt через certbot)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - werwolf
