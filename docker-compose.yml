services:
  werwolf:
    build: .
    restart: unless-stopped
    # Слухає тільки на localhost — Nginx на хості проксіює сюди
    ports:
      - "127.0.0.1:7433:7433"
    environment:
      SECRET_KEY: "CHANGE_ME_TO_RANDOM_SECRET_KEY"
      HTTPS: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7433/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# Nginx не запускаємо — на VPS вже є свій
