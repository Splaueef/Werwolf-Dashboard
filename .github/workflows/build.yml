name: Build & Release

on:
  push:
    tags:
      - "v*"           # Запускається при тегу: git tag v1.0.0 && git push --tags
  workflow_dispatch:   # Або вручну через GitHub UI → Actions → Run workflow

permissions:
  contents: write      # Потрібно для створення Release

jobs:

  # ── Linux ──────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (Qt WebEngine)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 \
            libgl1 libgl1-mesa-dri libgl1-mesa-glx libegl1 \
            libdbus-1-3 libdbus-glib-1-2 \
            libxcb1 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xkb1 libxkbcommon0 libxkbcommon-x11-0 \
            libfontconfig1 libfreetype6 \
            libxcomposite1 libxcursor1 libxdamage1 libxi6 \
            libxrandr2 libxtst6 libx11-xcb1 \
            libnss3 libnspr4 libasound2 \
            xvfb x11-utils

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install \
            PyQt6==6.7.1 \
            PyQt6-WebEngine==6.7.0 \
            flask requests pyinstaller

      - name: Build
        run: |
          export DISPLAY=:99
          export QT_QPA_PLATFORM=xcb
          export QT_XCB_GL_INTEGRATION=none
          export QTWEBENGINE_DISABLE_SANDBOX=1
          export QTWEBENGINE_CHROMIUM_FLAGS="--disable-gpu --disable-gpu-sandbox --no-sandbox"
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          pyinstaller \
            --onefile \
            --name werwolf-linux \
            --add-data "static:static" \
            --hidden-import flask \
            --hidden-import flask.json.provider \
            --hidden-import requests \
            --hidden-import PyQt6.QtWebEngineWidgets \
            --hidden-import PyQt6.QtWebEngineCore \
            --hidden-import PyQt6.QtNetwork \
            --collect-all PyQt6 \
            --collect-submodules flask \
            --noconfirm \
            werwolf.py

      - name: Chmod
        run: chmod +x dist/werwolf-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: werwolf-linux
          path: dist/werwolf-linux

  # ── Windows ────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install `
            PyQt6==6.7.1 `
            PyQt6-WebEngine==6.7.0 `
            flask requests pyinstaller pywin32

      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name werwolf-windows `
            --add-data "static;static" `
            --hidden-import flask `
            --hidden-import flask.json.provider `
            --hidden-import requests `
            --hidden-import PyQt6.QtWebEngineWidgets `
            --hidden-import PyQt6.QtWebEngineCore `
            --hidden-import PyQt6.QtNetwork `
            --collect-all PyQt6 `
            --collect-submodules flask `
            --noconfirm `
            werwolf.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: werwolf-windows
          path: dist/werwolf-windows.exe

  # ── Release ────────────────────────────────────────────────────
  release:
    name: 📦 Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: werwolf-linux
          path: artifacts/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: werwolf-windows
          path: artifacts/

      - name: Chmod Linux binary
        run: chmod +x artifacts/werwolf-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Werwolf Dashboard ${{ github.ref_name }}"
          body: |
            ## Werwolf Dashboard ${{ github.ref_name }}

            ### Завантаження

            | Платформа | Файл |
            |-----------|------|
            | 🐧 Linux  | `werwolf-linux` |
            | 🪟 Windows | `werwolf-windows.exe` |

            ### Linux
            ```bash
            chmod +x werwolf-linux
            ./werwolf-linux
            ```

            ### Windows
            Просто запусти `werwolf-windows.exe`

            ### Android (PWA)
            Відкрий у Chrome на телефоні → ⋮ → Додати на головний екран
          files: |
            artifacts/werwolf-linux
            artifacts/werwolf-windows.exe
          draft: false
          prerelease: false
