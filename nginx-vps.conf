# Конфіг для існуючого Nginx на VPS
# Скопіювати в: /etc/nginx/sites-available/werwolf
# Увімкнути: ln -s /etc/nginx/sites-available/werwolf /etc/nginx/sites-enabled/
# Перезавантажити: nginx -t && systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name dashboard.werwolf.pp.ua;

    # Шляхи до сертифікатів (вже є на VPS)
    ssl_certificate     /etc/letsencrypt/live/dashboard.werwolf.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.werwolf.pp.ua/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:WW:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           SAMEORIGIN;

    # Proxy до Docker контейнера (localhost:7433)
    location / {
        proxy_pass         http://127.0.0.1:7433;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # Кешування статики
    location /static/ {
        proxy_pass       http://127.0.0.1:7433/static/;
        expires          7d;
        add_header       Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name dashboard.werwolf.pp.ua;
    return 301 https://$host$request_uri;
}
